<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .dashboard-cards { display: flex; gap: 20px; margin-bottom: 30px; }
    .stat-card { flex: 1; padding: 20px; text-align: center; border-radius: 8px; }
    .stat-card h3 { margin-bottom: 10px; color: var(--text-muted, #666); }
    .stat-card h2 { font-size: 2rem; color: var(--accent, #333); margin: 0; }
    .action-forms { display: flex; gap: 8px; }
    .btn-sm { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
    .btn-approve { background-color: #28a745; }
    .btn-cancel { background-color: #dc3545; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="navbar-brand">Store Dashboard</span>
    <ul class="navbar-links">
      <li><a th:href="@{/web/admin/products}">Products</a></li>
      <li><a th:href="@{/web/admin/orders}" class="active">Orders</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Orders</h1>
    <p>Monitor and manage customer orders.</p>
  </div>

  <div class="dashboard-cards">
    <div class="glass-card stat-card">
      <h3>Total Orders</h3>
      <h2 th:text="${totalOrders}">0</h2>
    </div>
    <div class="glass-card stat-card">
      <h3>Total Revenue</h3>
      <h2 th:text="${'$' + totalRevenue}">$0.00</h2>
    </div>
  </div>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <div th:if="${#lists.isEmpty(orders)}" class="glass-card empty-state">
    <div class="empty-icon">🛒</div>
    <h3>No orders found</h3>
  </div>

  <div th:if="${!#lists.isEmpty(orders)}" class="table-wrapper glass-card">
    <table>
      <thead>
      <tr>
        <th>Order ID</th>
        <th>Customer</th>
        <th>Total</th>
        <th>Status</th>
        <th>Actions</th> </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}">
        <td style="font-family: monospace; color: var(--accent);" th:text="${order.id}"></td>
        <td th:text="${order.username != null ? order.username : 'Guest'}"></td>
        <td th:text="${'$' + order.totalAmount}" style="font-weight: 600;"></td>
        <td>
          <span th:if="${order.status.name() == 'COMPLETED'}" class="badge badge-success">Completed</span>
          <span th:if="${order.status.name() == 'PENDING'}" class="badge badge-warning">Pending</span>
          <span th:if="${order.status.name() == 'CANCELLED'}" class="badge badge-danger">Cancelled</span>
        </td>
        <td>
          <div th:if="${order.status.name() == 'PENDING'}" class="action-forms">
            <form th:action="@{/web/admin/orders/{id}/status(id=${order.id})}" method="post">
              <input type="hidden" name="status" value="COMPLETED" />
              <button type="submit" class="btn-sm btn-approve" title="Approve Order">Approve</button>
            </form>

            <form th:action="@{/web/admin/orders/{id}/status(id=${order.id})}" method="post">
              <input type="hidden" name="status" value="CANCELLED" />
              <button type="submit" class="btn-sm btn-cancel" title="Cancel Order"
                      onclick="return confirm('Are you sure you want to cancel this order?');">Cancel</button>
            </form>
          </div>
          <span th:unless="${order.status.name() == 'PENDING'}" style="color: #999; font-size: 0.85em;">
            Processed
          </span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
