<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="navbar-brand">Storefront</span>
    <ul class="navbar-links">
      <li><a th:href="@{/web/products}">Browse</a></li>
      <li><a th:href="@{/web/cart}">My Cart</a></li>
      <li><a th:href="@{/web/orders}" class="active">My Orders</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>My Orders</h1>
    <p>Track your order statuses and purchase history.</p>
  </div>

  <div th:if="${#lists.isEmpty(orders)}" class="glass-card empty-state">
    <div class="empty-icon">🧾</div>
    <h3>No orders found</h3>
    <p>You haven't placed any orders yet.</p>
    <a th:href="@{/web/products}" class="btn btn-primary mt-2">Browse Catalog</a>
  </div>

  <div th:if="${!#lists.isEmpty(orders)}" class="table-wrapper glass-card">
    <table>
      <thead>
      <tr>
        <th>Order ID</th>
        <th>Total</th>
        <th>Status</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}">
        <td style="font-family: monospace; color: var(--accent); font-weight: 500;" th:text="${order.id}"></td>
        <td class="product-price" th:text="${'$' + order.totalAmount}"></td>
        <td>
          <span th:if="${order.status.name() == 'COMPLETED'}" class="badge badge-success">Completed</span>
          <span th:if="${order.status.name() == 'PENDING'}" class="badge badge-warning">Pending</span>
          <span th:if="${order.status.name() == 'CANCELLED'}" class="badge badge-danger">Cancelled</span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
