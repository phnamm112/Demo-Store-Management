<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Products</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="navbar-brand">Storefront</span>
    <ul class="navbar-links">
      <li><a th:href="@{/web/products}" class="active">Browse</a></li>
      <li><a th:href="@{/web/cart}">My Cart</a></li>
      <li><a th:href="@{/web/orders}">My Orders</a></li>
      <li th:if="${isAdmin}">
        <a th:href="@{/web/admin/products}" style="color: var(--accent);">Admin Panel</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Products</h1>
    <p>Browse our catalog and find what you need.</p>
  </div>

  <div th:if="${successMessage}" class="alert alert-success">
    <span th:text="${successMessage}"></span>
  </div>

  <div th:if="${errorMessage}" class="alert alert-error">
    <span th:text="${errorMessage}"></span>
  </div>

  <div th:if="${#lists.isEmpty(products)}" class="glass-card empty-state">
    <div class="empty-icon">🪐</div>
    <h3>No products available</h3>
    <p>Check back later for new items.</p>
  </div>

  <div th:if="${!#lists.isEmpty(products)}" class="product-grid">
    <div th:each="prod : ${products}" class="glass-card product-card">

      <a th:href="@{/web/products/{id}(id=${prod.id})}" class="product-name" th:text="${prod.name}"></a>

      <p class="product-desc" th:text="${prod.description}"></p>

      <div class="product-meta">
        <span class="product-price" th:text="${'$' + prod.price}"></span>
        <span th:if="${prod.stockQuantity > 0}"
              class="badge badge-success"
              th:text="${prod.stockQuantity + ' In Stock'}"></span>
        <span th:if="${prod.stockQuantity == 0}"
              class="badge badge-danger">Sold Out</span>
      </div>

      <div th:unless="${isAdmin}" class="order-form mt-1" style="width: 100%;">
        <th:block th:if="${prod.stockQuantity > 0}">
          <form th:action="@{/web/cart/add}" method="POST" style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">

            <input type="hidden" name="productId" th:value="${prod.id}">

            <div style="display: flex; gap: 0.5rem; align-items: center; width: 100%;">
              <input type="number" name="quantity" value="1" min="1" th:max="${prod.stockQuantity}"
                     class="form-control" style="width: 80px;" aria-label="Item Quantity">

              <button type="submit" class="btn btn-accent btn-sm" style="flex-grow: 1;">
                Add to Cart
              </button>
            </div>

              <span style="font-size: 0.75rem; color: var(--text-muted); text-align: left; padding-left: 0.25rem;"
                  th:text="${'Max: ' + prod.stockQuantity}"></span>
          </form>
        </th:block>

        <button th:if="${prod.stockQuantity == 0}" class="btn btn-outline btn-sm" style="width: 100%;" disabled>
          Out of Stock
        </button>
      </div>

      <div th:if="${isAdmin}" class="mt-2" style="border-top: 1px solid var(--glass-border); padding-top: 0.75rem;">
        <a th:href="@{/web/admin/products/edit/{id}(id=${prod.id})}" class="btn btn-outline btn-sm" style="width: 100%; justify-content: center;">
          Edit Product
        </a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
