<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-wrapper">
  <div class="detail-card glass-card animate-in">
    <h2 th:text="${product.name}">Product Name</h2>
    <hr style="border: 0; border-top: 1px solid var(--glass-border); margin-bottom: 1.5rem;">

    <div class="detail-row">
      <div class="detail-label">Product ID</div>
      <div class="detail-value" th:text="${product.id}"></div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Description</div>
      <div class="detail-value" th:text="${product.description}"></div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Price</div>
      <div class="detail-value product-price" th:text="${'$' + product.price}"></div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Stock</div>
      <div class="detail-value">
        <span th:if="${product.stockQuantity > 0}" class="badge badge-success" th:text="${product.stockQuantity + ' In Stock'}"></span>
        <span th:if="${product.stockQuantity == 0}" class="badge badge-danger">Out of Stock</span>
      </div>
    </div>


    <div class="flex gap-1 mt-3">
      <a th:href="@{/web/admin/products}" class="btn btn-outline">Back to Products</a>
      <a th:href="@{/web/admin/products/edit/{id}(id=${product.id})}" class="btn btn-primary">Edit Product</a>
    </div>
  </div>
</div>

</body>
</html>
